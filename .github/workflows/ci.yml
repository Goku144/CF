name: test

on:
  push:
    branches:
      - main
      - dev/types
  pull_request:
    branches:
      - main
      - dev/types

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Run tests
        run: make test

      - name: Show test file
        run: |
          pwd
          ls -R
          sed -n '1,120p' tests/src/test.c